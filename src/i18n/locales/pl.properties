benefits.title=Dlaczego warto wybrać Inurri?
benefits.subtitle=Praktyczna podstawa strony: wydajność, widoczność i łatwiejsze zmiany.
benefits.1.title=Szybkość od początku
benefits.1.desc=Korzystam z Astro i lekkich rozwiązań frontendowych, żeby strony ładowały się szybko i wygodnie działały na telefonach oraz słabszym połączeniu.
benefits.2.title=Podstawy SEO w standardzie
benefits.2.desc=Przejrzysta struktura, metadane i wydajność są przygotowane wcześnie, aby późniejsze działania SEO miały lepszy punkt startu.
benefits.3.title=Myślenie o całości
benefits.3.desc=Dbam o widoczny interfejs i o systemy w tle, dzięki czemu strona może też wspierać codzienną pracę firmy.
benefits.4.title=Narzędzia dobrane do projektu
benefits.4.desc=Pomagam wybrać technologię, usługi i hosting dopasowane do zakresu, bez dokładania kosztów ani złożoności na zapas.
benefits.5.title=Gotowość na rozwój
benefits.5.desc=Po uruchomieniu strona może zyskiwać nowe sekcje, treści i funkcje wraz ze zmianą oferty lub sposobu pracy.
benefits.6.title=Przejrzyste koszty działania
benefits.6.desc=Przed wdrożeniem wyjaśniam koszt wykonania oraz przewidywane wydatki na hosting, usługi i utrzymanie.

