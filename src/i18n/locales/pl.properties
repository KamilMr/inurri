about.meta.title=O Inurri
about.meta.desc=Poznaj Kamila Mrówkę i sposób, w jaki Inurri tworzy strony oraz aplikacje webowe.
about.title=O <span class="text-primary">Inurri</span>
about.mission=Nazywam się Kamil Mrówka i jako full-stack developer tworzę strony oraz aplikacje webowe dla realnych potrzeb biznesu.
about.story.title=Jak pracuję
about.story.alt=Miejsce pracy z materiałami do planowania strony
about.story.p1=Inurri to moja niezależna działalność web developerska. Pomagam firmom zamieniać ogólne pomysły, istniejące treści albo problemy w codziennej pracy w konkretne rozwiązania online.
about.story.p2=Najczęściej zaczynam od praktycznej rozmowy: co strona lub aplikacja ma osiągnąć, kto będzie z niej korzystać i co ma być łatwe w późniejszym utrzymaniu. Na tej podstawie proponuję skupiony zakres i buduję projekt krok po kroku.
about.story.p3=Cel jest prosty: przygotować szybkie, użyteczne i utrzymywalne rozwiązanie bez niepotrzebnego komplikowania.
