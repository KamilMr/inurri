faq.default.title=Pytania i odpowiedzi
faq.default.subtitle=Najważniejsze informacje o wycenie i rozpoczęciu pracy.
faq.home.1.q=Czy muszę mieć gotowy projekt albo dokładny plan?
faq.home.1.a=Nie. Wystarczy ogólny pomysł, potrzeba biznesowa albo przykład strony, która Ci się podoba.
faq.home.2.q=Czy tworzysz tylko strony, czy też aplikacje webowe?
faq.home.2.a=Tworzę strony internetowe, aplikacje webowe, panele, formularze, automatyzacje i rozwiązania dopasowane do pracy firmy.
faq.home.3.q=Czy mogę później samodzielnie edytować treści?
faq.home.3.a=Tak, jeśli jest taka potrzeba, strona może mieć CMS albo prosty sposób edycji treści.
faq.home.4.q=Czy pomagasz po publikacji strony?
faq.home.4.a=Tak. Możemy ustalić jednorazowe poprawki albo stałą opiekę po starcie.
faq.home.5.q=Ile kosztuje strona internetowa?
faq.home.5.a=Proste strony zaczynają się od 1 200 zł, a większe projekty wyceniam indywidualnie po krótkiej rozmowie. Zobacz szczegóły w <a href="/pl/pricing" class="text-primary font-medium underline underline-offset-4">cenniku</a>.
faq.home.6.q=Od czego najlepiej zacząć?
faq.home.6.a=Najlepiej wysłać krótką wiadomość z informacją, czego potrzebujesz, jaki masz termin i czy masz już materiały lub inspiracje.
faq.pricing.1.q=Czy mogę dostać stałą cenę za projekt?
faq.pricing.1.a=Tak, po dokładnym ustaleniu wymagań. Przy projektach z wieloma niewiadomymi najpierw proponuję krótką płatną analizę albo pracę etapami z górnym limitem budżetu.
faq.pricing.2.q=Ile trwa przygotowanie strony firmowej?
faq.pricing.2.a=Prosta strona zazwyczaj zajmuje 2–4 tygodnie. Rozbudowane serwisy i aplikacje wymagają indywidualnego harmonogramu i podziału pracy na etapy.
faq.pricing.3.q=Czy pracujesz z istniejącym kodem?
faq.pricing.3.a=Tak. Mogę przejąć, uporządkować albo rozwinąć obecny projekt. Zaczynam wtedy od krótkiego audytu technicznego.
faq.pricing.4.q=Czy podane kwoty są ostateczne?
faq.pricing.4.a=Nie. To ceny startowe. Końcowa wycena zależy od ilości treści, liczby podstron i poziomu indywidualnego projektu.
faq.pricing.5.q=Czy mogę zacząć od małej strony?
faq.pricing.5.a=Tak. Najczęściej zaczynamy od prostego wariantu, a później rozbudowujemy stronę zgodnie z potrzebami.
faq.pricing.6.q=Co wpływa na cenę?
faq.pricing.6.a=Największe znaczenie mają: liczba podstron, ilość materiałów, indywidualny wygląd, panel użytkownika, płatności oraz połączenia z zewnętrznymi usługami.
