about.mission=Our mission is to find a new home for humanity among the stars, ensuring the survival of our species.
about.story.title=The Mission
about.story.p1=It started with the Blight. The world didn't need more engineers; it needed farmers. But we knew looking down at the dirt wasn't the answer. We had to look up.
about.story.p2=The Lazarus missions gave us hope. Twelve rangers sent into the unknown to find habitable worlds. We built the Endurance not just to explore, but to see if we could survive.
about.story.p3=Today, we stand on the precipice of a new dimension. We are the caretakers of the future, driven by love that transcends time and space.
