about.meta.desc=Meet Kamil Mrówka and the way Inurri builds websites and web applications.
about.title=About <span class="text-primary">Inurri</span>
about.mission=I am Kamil Mrówka, a full-stack developer building websites and web applications for real business needs.
about.story.title=How I work
about.story.alt=Workspace with website planning materials
about.story.p1=Inurri is my independent web development practice. I help companies turn rough ideas, existing content, or everyday workflow problems into clear digital products.
about.story.p2=I usually start with a practical conversation: what should the website or app achieve, who will use it, and what must be easy to maintain later. From there I propose a focused scope and build step by step.
about.story.p3=My goal is simple: deliver fast, useful, maintainable web solutions without unnecessary complexity.
