benefits.title=Why choose Inurri?
benefits.subtitle=A website built for speed, visibility, and future growth.
benefits.1.title=Fast and lightweight website
benefits.1.desc=I build websites with Astro, which helps reduce unnecessary weight and shorten loading times. The result is a website that runs smoothly on phones and weaker connections.
benefits.2.title=Prepared for SEO
benefits.2.desc=The website includes the basics needed for search visibility from the start. SEO efforts can then be developed further over time.
benefits.3.title=More than appearance
benefits.3.desc=I handle both what users see and the background solutions that can improve the company’s daily work.
benefits.4.title=Well-matched solutions
benefits.4.desc=There are many tools, services, and ways to build a website. I help choose the ones that fit your needs and avoid unnecessary costs.
benefits.5.title=A website after launch too
benefits.5.desc=After publication, you can keep changing content and expand the website with new features. I also agree with you on later maintenance.
benefits.6.title=Clear maintenance costs
benefits.6.desc=Before work begins, I define the website build cost and the expenses connected with keeping it running.

