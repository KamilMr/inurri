faq.default.title=Questions and answers
faq.default.subtitle=Key details about pricing and starting work.
faq.home.1.q=Is this boilerplate free to use?
faq.home.1.a=Yes! The core template is open-source and free to use for personal and commercial projects. We also offer a Pro version with advanced features and dedicated support.
faq.home.2.q=Do I need to know React?
faq.home.2.a=While we use React for interactive islands, you can use any framework you prefer (Vue, Svelte, Solid) or just sticking to vanilla JS. Astro is framework-agnostic by design.
faq.home.3.q=How does the search functionality work?
faq.home.3.a=We use Fuse.js, a lightweight fuzzy search library. It provides instant, typo-tolerant search results without needing an external server or API key.
faq.home.4.q=Can I deploy this to Vercel/Netlify?
faq.home.4.a=Absolutely. The template is pre-configured with adapters for Vercel, Netlify, and Cloudflare Pages. Just push to GitHub and connect your repository.
faq.home.5.q=What makes this 'premium'?
faq.home.5.a=Beyond the design, we include production-grade setups for SEO, analytics, sitemaps, RSS feeds, open graph images, dark mode, and accessibility out of the box.
faq.pricing.1.q=Are these final prices?
faq.pricing.1.a=No. These are starting prices. The final quote depends on scope, amount of content, number of pages, and level of custom design.
faq.pricing.2.q=How does the 120 PLN / h rate work?
faq.pricing.2.a=The hourly rate applies to extra work, consulting, and further website development after the base scope is agreed.
faq.pricing.3.q=Can I start with a small website?
faq.pricing.3.a=Yes. We can start with a simple version and expand it later as your needs become clearer.
faq.pricing.4.q=What affects the price?
faq.pricing.4.a=The main factors are page count, amount of material, custom visual design, user panels, payments, and connections with external services.
