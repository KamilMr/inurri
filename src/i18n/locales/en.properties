faq.default.title=Questions and answers
faq.default.subtitle=Key details about pricing and starting work.
faq.home.1.q=Do I need a finished design or detailed plan?
faq.home.1.a=No. A general idea, business need, or example of a website you like is enough.
faq.home.2.q=Do you only build websites, or also web apps?
faq.home.2.a=I build websites, web applications, panels, forms, automations, and solutions matched to how the company works.
faq.home.3.q=Can I edit the content myself later?
faq.home.3.a=Yes. If needed, the website can include a CMS or another simple way to edit content.
faq.home.4.q=Do you help after the website is published?
faq.home.4.a=Yes. I can arrange one-time changes or ongoing care after launch.
faq.home.5.q=How much does a website cost?
faq.home.5.a=Simple websites start from 1,200 PLN, while larger projects are priced individually after a short conversation. See details on the <a href="/en/pricing" class="text-primary font-medium underline underline-offset-4">pricing page</a>.
faq.home.6.q=What is the best way to start?
faq.home.6.a=Send a short message with what you need, your expected timeline, and whether you already have materials or inspiration.
faq.pricing.1.q=Can I get a fixed price for the project?
faq.pricing.1.a=Yes, after the requirements are clearly defined. For projects with many unknowns, I first suggest a short paid analysis or staged work with a budget cap.
faq.pricing.2.q=How long does a company website take?
faq.pricing.2.a=A simple website usually takes 2–4 weeks. Larger websites and apps require an individual schedule and splitting the work into stages.
faq.pricing.3.q=Do you work with existing code?
faq.pricing.3.a=Yes. I can take over, organize, or develop an existing project. I start with a short technical audit.
faq.pricing.4.q=Are these final prices?
faq.pricing.4.a=No. These are starting prices. The final quote depends on amount of content, number of pages, and level of custom design.
faq.pricing.5.q=Can I start with a small website?
faq.pricing.5.a=Yes. I can start with a simple version and expand it later as your needs become clearer.
faq.pricing.6.q=What affects the price?
faq.pricing.6.a=The main factors are page count, amount of material, custom visual design, user panels, payments, and connections with external services.
